name: Gitleaks

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    if: github.repository == 'oaslananka-lab/vscode-toon-tools'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        run: docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest detect --source=/repo --redact --verbose
        shell: bash
