name: Sync to LAB and GitLab

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync remotes
        run: bash scripts/sync-remotes.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
