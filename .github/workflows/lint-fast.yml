name: Fast Lint

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  lint-fast:
    if: github.repository == 'oaslananka-LAB/vscode-toon-tools'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
