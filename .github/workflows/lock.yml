name: Lock Old Closed Threads

on:
  schedule:
    - cron: '43 2 * * 0'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  lock:
    if: github.repository == 'oaslananka-LAB/vscode-toon-tools'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const cutoff = Date.now() - 365 * 24 * 60 * 60 * 1000;
            for (const type of ['issues', 'pulls']) {
              for await (const response of github.paginate.iterator(
                type === 'issues' ? github.rest.issues.listForRepo : github.rest.pulls.list,
                { owner: context.repo.owner, repo: context.repo.repo, state: 'closed', per_page: 100 }
              )) {
                for (const item of response.data) {
                  const closedAt = item.closed_at && Date.parse(item.closed_at);
                  if (!closedAt || closedAt > cutoff || item.locked) continue;
                  await github.rest.issues.lock({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: item.number,
                    lock_reason: 'resolved'
                  });
                }
              }
            }
