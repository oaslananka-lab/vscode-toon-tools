name: Stale

on:
  schedule:
    - cron: '12 2 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    if: github.repository == 'oaslananka-lab/vscode-toon-tools'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: This issue is stale because it has had no activity for 60 days.
          stale-pr-message: This pull request is stale because it has had no activity for 60 days.
