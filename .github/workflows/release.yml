name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v1.1.0)'
        required: true
      publish:
        description: Publish to registries
        type: choice
        default: 'false'
        options: ['false', 'true']
      approval:
        description: 'Type APPROVE_RELEASE to confirm publish'
        required: false

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    if: github.repository == 'oaslananka-LAB/vscode-toon-tools'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: release
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate approval
        run: |
          if [ "${{ inputs.publish }}" = "true" ] && [ "${{ inputs.approval }}" != "APPROVE_RELEASE" ]; then
            echo "Set approval=APPROVE_RELEASE to publish" >&2
            exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - run: npm ci
      - run: npm exec -- task build
      - run: npm exec -- task package
      - name: Attest build provenance
        if: hashFiles('*.vsix') != ''
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: '*.vsix'
      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3
      - name: Verify Doppler secrets
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: bash scripts/verify-doppler-secrets.sh
      - name: Publish
        if: inputs.publish == 'true'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: doppler run --project vscode-toon-tools --config main -- bash scripts/publish.sh
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh_args=(--repo "${{ github.repository }}" --title "${{ inputs.version }}" --generate-notes)
          [ "${{ inputs.publish }}" != "true" ] && gh_args+=(--draft)
          assets=()
          compgen -G "*.vsix" > /dev/null && assets+=(*.vsix)
          gh release create "${{ inputs.version }}" "${gh_args[@]}" "${assets[@]}"
