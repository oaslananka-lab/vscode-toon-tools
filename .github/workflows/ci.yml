name: TOON Tools CI

on:
  push:
    branches: ['**']
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  ci:
    name: Full CI Pipeline
    if: github.repository == 'oaslananka-lab/vscode-toon-tools'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - name: Install dependencies
        run: npm ci
      - name: Run CI (Linux with xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm exec -- task ci
        shell: bash
      - name: Run CI (non-Linux)
        if: runner.os != 'Linux'
        run: npm exec -- task ci
        shell: bash
      - name: Install Doppler CLI
        if: matrix.os == 'ubuntu-latest' && github.actor != 'dependabot[bot]'
        uses: dopplerhq/cli-action@v3
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && github.actor != 'dependabot[bot]'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          curl -Os https://uploader.codecov.io/latest/linux/codecov
          chmod +x codecov
          CODECOV_TOKEN=$(doppler secrets get CODECOV_TOKEN --plain --project vscode-toon-tools --config main)
          ./codecov -f coverage/lcov.info -t "$CODECOV_TOKEN"
        shell: bash
