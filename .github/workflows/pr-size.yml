name: PR Size

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  size:
    if: github.repository == 'oaslananka-LAB/vscode-toon-tools'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pull = context.payload.pull_request;
            const total = pull.additions + pull.deletions;
            const label =
              total < 50 ? 'size/XS' :
              total < 200 ? 'size/S' :
              total < 600 ? 'size/M' :
              total < 1200 ? 'size/L' : 'size/XL';
            const existing = (await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pull.number
            })).data.map((item) => item.name).filter((name) => name.startsWith('size/'));
            for (const name of existing) {
              await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pull.number, name });
            }
            await github.rest.issues.addLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pull.number, labels: [label] });
