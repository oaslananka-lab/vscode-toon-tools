trigger:
  branches:
    include: ['*']

pr:
  branches:
    include: ['*']

variables:
  NodeVersion: '20.19.0'

stages:
  - stage: Validate
    displayName: Validate TOON Tools
    jobs:
      - job: CrossPlatform
        displayName: Lint, build, test
        strategy:
          matrix:
            linux: { imageName: ubuntu-latest }
            windows: { imageName: windows-latest }
            macos: { imageName: macos-latest }
        pool:
          vmImage: $(imageName)
        steps:
          - checkout: self
          - task: UseNode@1
            displayName: Use Node.js $(NodeVersion)
            inputs:
              version: $(NodeVersion)
          - script: npm ci
            displayName: Install dependencies
          - script: npm run audit:ci
            displayName: Audit dependencies
          - script: npm run format:check
            displayName: Format check
          - script: npm run lint
            displayName: Lint
          - script: npm run typecheck
            displayName: Type-check
          - script: npm run test:unit:coverage
            displayName: Unit tests + coverage
          - script: npm run build
            displayName: Build extension

      - job: Package
        displayName: Build VSIX artifact
        dependsOn: CrossPlatform
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - task: UseNode@1
            inputs:
              version: $(NodeVersion)
          - script: npm ci
          - script: npm run check:ci
            displayName: Full CI gate
          - bash: |
              mkdir -p "$(Build.ArtifactStagingDirectory)"
              cp ./*.vsix "$(Build.ArtifactStagingDirectory)/"
            displayName: Stage VSIX
          - publish: $(Build.ArtifactStagingDirectory)
            artifact: toon-tools-vsix
            displayName: Publish VSIX artifact
