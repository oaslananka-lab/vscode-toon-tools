trigger: none
pr: none

parameters:
  - name: publishToOpenVsx
    type: boolean
    default: false

variables:
  - group: toon-tools-secrets
  - name: NodeVersion
    value: '20.19.0'

stages:
  - stage: Package
    displayName: Build production VSIX
    jobs:
      - job: BuildAndPackage
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - task: UseNode@1
            inputs:
              version: $(NodeVersion)
          - script: npm ci
          - script: npm run check:ci
            displayName: Full CI gate
          - bash: |
              mkdir -p "$(Build.ArtifactStagingDirectory)"
              cp ./*.vsix "$(Build.ArtifactStagingDirectory)/"
          - publish: $(Build.ArtifactStagingDirectory)
            artifact: toon-tools-vsix

  - stage: AwaitApproval
    displayName: Await owner approval
    dependsOn: Package
    jobs:
      - job: ManualApproval
        pool: server
        timeoutInMinutes: 4320
        steps:
          - task: ManualValidation@0
            timeoutInMinutes: 1440
            inputs:
              instructions: |
                Review the packaged VSIX artifact.
                Azure DevOps pipeline is manual fallback only.
                Primary automated CI/CD is in the oaslananka-lab GitHub org.
              onTimeout: reject

  - stage: Publish
    displayName: Publish to marketplaces
    dependsOn: AwaitApproval
    jobs:
      - job: PublishMarketplaces
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - task: UseNode@1
            inputs:
              version: $(NodeVersion)
          - script: npm ci
          - task: DopplerSecrets@0
            inputs:
              dopplerServiceToken: $(DOPPLER_SERVICE_TOKEN)
              dopplerProject: vscode-toon-tools
              dopplerConfig: main
          - script: bash scripts/publish.sh
            displayName: Publish to VS Code Marketplace and Open VSX
