workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - when: never

stages:
  - validate
  - package

default:
  image: node:20.19.0
  cache:
    key:
      files: [package-lock.json]
    paths: [.npm/]
  before_script:
    - npm ci --cache .npm --prefer-offline

validate:
  stage: validate
  rules:
    - when: manual
  script:
    - npm run audit:ci
    - npm run format:check
    - npm run lint
    - npm run typecheck
    - npm run test:unit
    - npm run build

package:
  stage: package
  needs: [validate]
  rules:
    - when: manual
  script:
    - npm run check:ci
  artifacts:
    name: toon-tools-vsix-$CI_COMMIT_REF_SLUG
    paths: ['*.vsix']
    expire_in: 14 days
